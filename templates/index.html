<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QRShield API</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #141414; border: 1px solid #2a2a2a; border-radius: 16px; padding: 40px; max-width: 480px; width: 90%; text-align: center; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .badge { display: inline-block; background: #16a34a22; color: #16a34a; border: 1px solid #16a34a44; border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: 600; margin-bottom: 24px; }
    p { color: #9ca3af; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
    .endpoints { text-align: left; background: #0a0a0a; border-radius: 10px; padding: 16px; margin-bottom: 24px; }
    .ep { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
    .ep:last-child { margin-bottom: 0; }
    .method { background: #1e3a5f; color: #60a5fa; border-radius: 4px; padding: 2px 8px; font-weight: 700; font-size: 11px; min-width: 40px; text-align: center; }
    .method.post { background: #3a1e1e; color: #f87171; }
    .path { color: #e5e7eb; font-family: monospace; }
    .desc { color: #6b7280; font-size: 11px; }
    a { color: #60a5fa; text-decoration: none; font-size: 13px; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>QRShield API</h1>
    <div class="badge">Online</div>
    <p>QR code malicious URL detection backend.<br/>ML + DL fusion model — 99% accuracy.</p>
    <div class="endpoints">
      <div class="ep">
        <span class="method">GET</span>
        <span class="path">/health</span>
        <span class="desc">Service health check</span>
      </div>
      <div class="ep">
        <span class="method post">POST</span>
        <span class="path">/scan</span>
        <span class="desc">Upload QR image file</span>
      </div>
      <div class="ep">
        <span class="method post">POST</span>
        <span class="path">/scan_url</span>
        <span class="desc">Analyze URL directly</span>
      </div>
    </div>
    <a href="/docs">View API docs (Swagger) →</a>
  </div>
</body>
</html>
